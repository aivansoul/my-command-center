<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: #000000;
    color: #ffffff;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 40px 32px 48px;
  }

  .header {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 48px;
    margin-bottom: 40px;
    padding-bottom: 36px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }

  .header-left { display: flex; flex-direction: column; gap: 6px; }

  .greeting {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 400;
    color: #facc15;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .title-line {
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-wrap: wrap;
  }

  .title-normal {
    font-family: 'DM Serif Display', serif;
    font-style: normal;
    font-size: 44px;
    color: #ffffff;
    line-height: 1;
    letter-spacing: -1px;
  }

  .title-italic {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 44px;
    color: #60a5fa;
    line-height: 1;
    letter-spacing: -1px;
  }

  .subtitle {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 300;
    color: rgba(250,204,21,0.5);
    letter-spacing: 1px;
    margin-top: 2px;
  }

  .clock-row {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-top: 14px;
  }

  .clock {
    font-family: 'DM Serif Display', serif;
    font-style: normal;
    font-size: 36px;
    color: #ffffff;
    letter-spacing: -1px;
    line-height: 1;
  }

  .date-display {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 300;
    color: rgba(250,204,21,0.5);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .pomo-inline {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 18px;
    padding: 24px 28px;
    min-width: 190px;
  }

  .pomo-label {
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    font-weight: 400;
    color: #facc15;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .pomo-tabs {
    display: flex;
    gap: 3px;
    background: rgba(255,255,255,0.03);
    border-radius: 20px;
    padding: 3px;
  }

  .ptab {
    padding: 5px 12px;
    border-radius: 16px;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    cursor: pointer;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.3);
    transition: all 0.2s;
  }

  .ptab.on {
    background: rgba(59,130,246,0.1);
    color: #3b82f6;
    border: 1px solid rgba(59,130,246,0.18);
  }

  .pomo-time {
    font-family: 'DM Serif Display', serif;
    font-size: 52px;
    color: #ffffff;
    letter-spacing: -1px;
    line-height: 1;
    transition: color 0.4s;
  }

  .pomo-time.running { color: #3b82f6; }

  .pomo-btns {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .pbtn {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.08);
    background: transparent;
    color: rgba(255,255,255,0.25);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .pbtn:hover { border-color: rgba(59,130,246,0.35); color: #3b82f6; }

  .pbtn.play {
    width: 44px; height: 44px;
    border: 1px solid rgba(59,130,246,0.25);
    background: rgba(59,130,246,0.07);
    color: #3b82f6;
    font-size: 16px;
  }

  .pbtn.play:hover { background: rgba(59,130,246,0.14); }

  .pomo-dots { display: flex; gap: 7px; }

  .pdot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    transition: all 0.4s;
  }

  .pdot.on {
    background: #3b82f6;
    border-color: #3b82f6;
    box-shadow: 0 0 6px rgba(59,130,246,0.35);
  }

  .pomo-sub {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 300;
    color: rgba(250,204,21,0.35);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 36px;
  }

  .divider-line { flex: 1; height: 1px; background: rgba(59,130,246,0.12); }

  .divider-ornament {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 16px;
    color: rgba(96,165,250,0.5);
    letter-spacing: 6px;
  }

  .quote-section {
    text-align: center;
    padding: 0 24px;
    margin-bottom: 40px;
    min-height: 140px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .quote-mark {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 56px;
    color: rgba(96,165,250,0.15);
    line-height: 0.5;
    display: block;
    margin-bottom: 14px;
  }

  .quote-text {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 21px;
    color: #ffffff;
    line-height: 1.65;
    transition: opacity 0.8s ease;
  }

  .quote-text.fade { opacity: 0; }

  .quote-text strong {
    font-style: normal;
    color: #60a5fa;
    font-weight: 400;
  }

  .quote-author {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 300;
    color: rgba(250,204,21,0.35);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 14px;
    display: block;
    transition: opacity 0.8s ease;
  }

  .quote-author.fade { opacity: 0; }

  .quote-timer {
    margin-top: 14px;
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    color: rgba(250,204,21,0.3);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .footer {
    padding-top: 24px;
    border-top: 1px solid rgba(255,255,255,0.05);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-text {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 300;
    color: rgba(255,255,255,0.12);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .footer-ornament {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 13px;
    color: rgba(250,204,21,0.3);
  }

  @media (max-width: 700px) {
    .header { grid-template-columns: 1fr; gap: 24px; }
    .pomo-inline { width: 100%; }
    .title-normal, .title-italic { font-size: 34px; }
    .pomo-time { font-size: 44px; }
    .quote-text { font-size: 17px; }
    .wrap { padding: 28px 20px 36px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="header-left">
      <div class="greeting" id="greeting">Bonjour</div>
      <div class="title-line">
        <span class="title-normal">Command</span>
        <span class="title-italic">Center</span>
      </div>
      <div class="subtitle">Svetlana Totolina — AI & Automation</div>
      <div class="clock-row">
        <div class="clock" id="clock">00:00</div>
        <div class="date-display" id="date-disp">—</div>
      </div>
    </div>

    <div class="pomo-inline">
      <div class="pomo-label">Pomodoro</div>
      <div class="pomo-tabs">
        <button class="ptab on" onclick="setMode(25,this)">25</button>
        <button class="ptab" onclick="setMode(5,this)">5</button>
        <button class="ptab" onclick="setMode(15,this)">15</button>
      </div>
      <div class="pomo-time" id="ptime">25:00</div>
      <div class="pomo-btns">
        <button class="pbtn" onclick="resetP()">↺</button>
        <button class="pbtn play" id="pplay" onclick="toggleP()">▶</button>
        <button class="pbtn" onclick="skipP()">⏭</button>
      </div>
      <div class="pomo-dots">
        <div class="pdot"></div><div class="pdot"></div>
        <div class="pdot"></div><div class="pdot"></div>
      </div>
      <div class="pomo-sub" id="psub">Session 1 · 4</div>
    </div>
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-ornament">✦ ✦ ✦</div>
    <div class="divider-line"></div>
  </div>

  <div class="quote-section">
    <span class="quote-mark">"</span>
    <div class="quote-text" id="quote-text">Chargement...</div>
    <span class="quote-author" id="quote-author"></span>
    <div class="quote-timer" id="quote-timer"></div>
  </div>

  <div class="footer">
    <div class="footer-text">© Svetlana Totolina</div>
    <div class="footer-ornament">Discipline · Excellence · Flow</div>
    <div class="footer-text" id="year">2026</div>
  </div>

</div>

<script>
const QUOTES = [
  { text: "Le secret pour avancer est de <strong>commencer</strong>.", author: "Mark Twain" },
  { text: "Fais-le maintenant. Parfois « plus tard » devient <strong>jamais</strong>.", author: "" },
  { text: "Chaque expert était autrefois un <strong>débutant</strong>.", author: "Helen Hayes" },
  { text: "Discipline = <strong>Liberté</strong>.", author: "Jocko Willink" },
  { text: "Les petits progrès quotidiens mènent aux <strong>grands résultats</strong>.", author: "" },
  { text: "Tu n'as pas à être géniale pour commencer, mais tu dois <strong>commencer</strong> pour être géniale.", author: "" },
  { text: "Ce n'est pas ce que tu fais parfois qui compte, c'est ce que tu fais <strong>systématiquement</strong>.", author: "Marie Forleo" },
  { text: "Je suis capable de <strong>construire</strong> exactement la vie que je veux.", author: "" },
  { text: "Chaque ligne de code que j'écris me rapproche de ma <strong>liberté</strong>.", author: "" },
  { text: "Je ne suis pas en train d'apprendre — je suis en train de <strong>devenir</strong>.", author: "" },
  { text: "Mon cerveau est mon <strong>outil le plus puissant</strong> — je l'entraîne chaque jour.", author: "" },
  { text: "Je choisis la <strong>discipline</strong> aujourd'hui pour la liberté de demain.", author: "" },
  { text: "Je suis une <strong>bâtisseuse</strong> — chaque jour j'ajoute une brique.", author: "" },
  { text: "Les obstacles sont des <strong>données</strong>, pas des verdicts.", author: "" },
  { text: "Je fais confiance au <strong>processus</strong> même quand je ne vois pas encore les résultats.", author: "" },
  { text: "Mon succès est <strong>inévitable</strong> si je reste cohérente.", author: "" },
  { text: "Je suis exactement là où je dois être pour devenir qui je veux <strong>être</strong>.", author: "" },
  { text: "En AI comme en vie : <strong>itère vite</strong>, apprends encore plus vite.", author: "" },
  { text: "L'automatisation libère mon esprit pour les choses qui <strong>comptent vraiment</strong>.", author: "" },
  { text: "Je ne subis pas la technologie — je la <strong>maîtrise</strong>.", author: "" },
  { text: "Chaque workflow automatisé est une heure de ma vie <strong>récupérée</strong>.", author: "" },
  { text: "Chaque journée est une nouvelle chance de <strong>construire</strong> la vie que je veux.", author: "" },
  { text: "Je ne cherche pas la perfection — je cherche le <strong>progrès</strong>.", author: "" },
  { text: "La version de moi dans 1 an sera <strong>reconnaissante</strong> de ce que je fais aujourd'hui.", author: "" },
  { text: "Je suis plus forte que je ne le <strong>crois</strong>.", author: "" },
  { text: "Mes habitudes d'aujourd'hui <strong>sculptent</strong> ma personnalité de demain.", author: "" },
  { text: "Je construis quelque chose que le monde n'a <strong>jamais vu</strong>.", author: "" },
  { text: "La clarté vient de <strong>l'action</strong>, pas de la réflexion.", author: "" },
  { text: "Je suis le <strong>chef d'orchestre</strong> de ma propre transformation.", author: "" },
  { text: "Chaque « non » à la distraction est un « oui » à mon <strong>avenir</strong>.", author: "" },
];

const ROTATION_MS = 15 * 60 * 1000;
let quoteIdx = 0;
let nextChange = 0;

function showQuote(idx, animate) {
  const q = QUOTES[idx];
  const t = document.getElementById('quote-text');
  const a = document.getElementById('quote-author');
  if (animate) {
    t.classList.add('fade'); a.classList.add('fade');
    setTimeout(() => {
      t.innerHTML = q.text;
      a.textContent = q.author ? `— ${q.author}` : '';
      t.classList.remove('fade'); a.classList.remove('fade');
    }, 800);
  } else {
    t.innerHTML = q.text;
    a.textContent = q.author ? `— ${q.author}` : '';
  }
}

function updateTimer() {
  const rem = Math.max(0, nextChange - Date.now());
  const m = Math.floor(rem / 60000);
  const s = Math.floor((rem % 60000) / 1000);
  document.getElementById('quote-timer').textContent =
    `Prochaine pensée dans ${m}:${String(s).padStart(2,'0')}`;
}

function initQuotes() {
  const now = new Date();
  const block = Math.floor((now.getHours() * 60 + now.getMinutes()) / 15);
  quoteIdx = block % QUOTES.length;
  const msIn = ((now.getMinutes() % 15) * 60 + now.getSeconds()) * 1000;
  nextChange = Date.now() + ROTATION_MS - msIn;
  showQuote(quoteIdx, false);
  setTimeout(() => {
    rotate();
    setInterval(rotate, ROTATION_MS);
  }, nextChange - Date.now());
  setInterval(updateTimer, 1000);
}

function rotate() {
  quoteIdx = (quoteIdx + 1) % QUOTES.length;
  nextChange = Date.now() + ROTATION_MS;
  showQuote(quoteIdx, true);
}

const DAYS = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const MONTHS = ['jan','fév','mar','avr','mai','juin','juil','août','sep','oct','nov','déc'];

function tick() {
  const n = new Date();
  document.getElementById('clock').textContent =
    `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
  document.getElementById('date-disp').textContent =
    `${DAYS[n.getDay()]} ${n.getDate()} ${MONTHS[n.getMonth()]} ${n.getFullYear()}`;
  const hr = n.getHours();
  document.getElementById('greeting').textContent =
    hr < 6 ? 'Bonne nuit' : hr < 12 ? 'Bonjour' : hr < 18 ? 'Bon après-midi' : 'Bonsoir';
  document.getElementById('year').textContent = n.getFullYear();
}

let pSec = 1500, pRun = false, pInt = null, pDur = 1500, pSess = 0;

function setMode(min, btn) {
  pDur = min * 60; pSec = pDur;
  if (pRun) { clearInterval(pInt); pRun = false; }
  document.getElementById('pplay').textContent = '▶';
  document.getElementById('ptime').classList.remove('running');
  drawTime();
  document.querySelectorAll('.ptab').forEach(t => t.classList.remove('on'));
  btn.classList.add('on');
}

function toggleP() {
  if (pRun) {
    clearInterval(pInt); pRun = false;
    document.getElementById('pplay').textContent = '▶';
    document.getElementById('ptime').classList.remove('running');
  } else {
    pRun = true;
    document.getElementById('pplay').textContent = '⏸';
    document.getElementById('ptime').classList.add('running');
    pInt = setInterval(() => {
      pSec--;
      if (pSec <= 0) {
        clearInterval(pInt); pRun = false;
        document.getElementById('pplay').textContent = '▶';
        document.getElementById('ptime').classList.remove('running');
        pSess = Math.min(pSess + 1, 4);
        updateDots(); pSec = pDur;
      }
      drawTime();
    }, 1000);
  }
}

function resetP() {
  clearInterval(pInt); pRun = false; pSec = pDur;
  document.getElementById('pplay').textContent = '▶';
  document.getElementById('ptime').classList.remove('running');
  drawTime();
}

function skipP() { resetP(); }

function drawTime() {
  document.getElementById('ptime').textContent =
    `${String(Math.floor(pSec/60)).padStart(2,'0')}:${String(pSec%60).padStart(2,'0')}`;
}

function updateDots() {
  document.querySelectorAll('.pdot').forEach((d,i) => d.classList.toggle('on', i < pSess));
  document.getElementById('psub').textContent =
    pSess >= 4 ? '✦ Série complète' : `Session ${pSess+1} · 4`;
}

window.addEventListener('load', () => {
  tick(); setInterval(tick, 1000);
  initQuotes();
});
</script>
</body>
</html>
