<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #08080e;
    --bg2: #0f0f18;
    --bg3: #16161f;
    --bg4: #1e1e2a;
    --accent: #7c6af7;
    --accent2: #f7716a;
    --accent3: #6af7c8;
    --accent4: #f7c86a;
    --text: #e2e2ee;
    --text2: #7070a0;
    --text3: #4a4a70;
    --border: rgba(124,106,247,0.12);
    --border2: rgba(124,106,247,0.25);
    --glow: rgba(124,106,247,0.25);
    --glow2: rgba(106,247,200,0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle grid bg */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,106,247,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,247,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  /* Ambient glow top */
  body::after {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(124,106,247,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 1440px;
    margin: 0 auto;
    padding: 20px 24px 32px;
  }

  /* ── HEADER ── */
  .header {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .header-left { display: flex; flex-direction: column; gap: 4px; }

  .greeting {
    font-size: 13px;
    color: var(--text2);
    font-family: 'Space Mono', monospace;
  }

  .header-title {
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  .header-title span { color: var(--accent); }

  .header-center {
    text-align: center;
  }

  .live-clock {
    font-family: 'Space Mono', monospace;
    font-size: 42px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 3px;
    line-height: 1;
    text-shadow: 0 0 40px var(--glow);
  }

  .live-date {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text2);
    margin-top: 6px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .header-right {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 12px;
  }

  /* Settings gear */
  .settings-btn {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.2s;
  }

  .settings-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Settings panel (hidden by default) */
  .settings-panel {
    display: none;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }

  .settings-panel.open { display: flex; }

  .settings-panel label {
    font-size: 11px;
    color: var(--text2);
    font-family: 'Space Mono', monospace;
    white-space: nowrap;
  }

  .settings-panel input {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    flex: 1;
    min-width: 200px;
  }

  .settings-panel input:focus { outline: none; border-color: var(--accent); }

  .btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 8px 18px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
    white-space: nowrap;
  }

  .btn:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn.ghost { background: transparent; border: 1px solid var(--border); color: var(--text2); }
  .btn.ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* ── QUOTE ── */
  .quote-bar {
    background: linear-gradient(135deg, rgba(124,106,247,0.08), rgba(106,247,200,0.05));
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 20px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 52px;
  }

  .quote-icon { font-size: 18px; flex-shrink: 0; }

  .quote-text {
    font-size: 13px;
    font-style: italic;
    color: var(--text2);
    line-height: 1.5;
    transition: opacity 0.5s;
  }

  .quote-text strong { color: var(--accent3); font-style: normal; font-weight: 500; }

  /* ── STATS ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 20px;
  }

  .stat {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .stat:hover { border-color: var(--border2); }

  .stat::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--stat-color, var(--accent));
    opacity: 0.6;
  }

  .stat-val {
    font-family: 'Space Mono', monospace;
    font-size: 32px;
    font-weight: 700;
    color: var(--stat-color, var(--accent));
    line-height: 1;
    margin-bottom: 6px;
  }

  .stat-lbl {
    font-size: 11px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    transition: border-color 0.2s;
  }

  .card:hover { border-color: var(--border2); }
  .span2 { grid-column: span 2; }
  .span3 { grid-column: span 3; }

  .card-head {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 18px;
  }

  .card-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .card-title {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    color: var(--text2);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .card-badge {
    margin-left: auto;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 20px;
    background: var(--bg3);
    color: var(--text2);
    font-family: 'Space Mono', monospace;
  }

  /* Tasks */
  .task {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    animation: fadeUp 0.3s ease forwards;
    opacity: 0;
  }

  .task:last-child { border-bottom: none; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .cb {
    width: 17px; height: 17px;
    border: 1.5px solid var(--accent);
    border-radius: 5px;
    flex-shrink: 0;
    margin-top: 2px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
  }

  .cb.on { background: var(--accent); border-color: var(--accent); color: white; }
  .cb.on::after { content: '✓'; }

  .task-body { flex: 1; min-width: 0; }
  .task-name { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.4; }
  .task-name.done { text-decoration: line-through; color: var(--text3); }
  .task-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }

  .tag {
    font-size: 10px; font-weight: 600;
    padding: 2px 7px; border-radius: 20px;
    flex-shrink: 0; white-space: nowrap;
  }

  .tag-h { background: rgba(247,113,106,0.12); color: #f7716a; }
  .tag-m { background: rgba(247,200,106,0.12); color: #f7c86a; }
  .tag-l { background: rgba(106,247,200,0.12); color: #6af7c8; }

  /* Habits */
  .habit {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    animation: fadeUp 0.3s ease forwards;
    opacity: 0;
  }

  .habit:last-child { border-bottom: none; }
  .habit-icon { font-size: 15px; flex-shrink: 0; }
  .habit-name { flex: 1; font-size: 13px; color: var(--text); }

  .streak {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    display: flex;
    align-items: center;
    gap: 3px;
  }

  .hcheck {
    width: 26px; height: 26px;
    border: 1.5px solid var(--border2);
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
  }

  .hcheck.on {
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 10px var(--glow);
  }

  /* Pomodoro */
  .pomo { text-align: center; padding: 4px 0; }

  .pomo-tabs {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 20px;
  }

  .ptab {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 11px;
    cursor: pointer;
    border: 1px solid var(--border);
    color: var(--text2);
    background: transparent;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .ptab.on { background: var(--accent); border-color: var(--accent); color: white; }

  .pomo-time {
    font-family: 'Space Mono', monospace;
    font-size: 58px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 4px;
    line-height: 1;
    margin-bottom: 20px;
    text-shadow: 0 0 30px var(--glow);
  }

  .pomo-time.running { color: var(--accent3); text-shadow: 0 0 30px var(--glow2); }

  .pomo-btns { display: flex; gap: 10px; justify-content: center; margin-bottom: 18px; }

  .pbtn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }

  .pbtn.play {
    width: 56px; height: 56px;
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    font-size: 20px;
    box-shadow: 0 0 20px var(--glow);
  }

  .pbtn:hover { border-color: var(--accent); color: var(--accent); transform: scale(1.05); }
  .pbtn.play:hover { opacity: 0.9; }

  .pomo-dots { display: flex; gap: 8px; justify-content: center; }
  .pdot { width: 9px; height: 9px; border-radius: 50%; background: var(--border2); transition: all 0.3s; }
  .pdot.on { background: var(--accent); box-shadow: 0 0 8px var(--glow); }
  .pomo-sub { font-size: 11px; color: var(--text2); margin-top: 10px; font-family: 'Space Mono', monospace; }

  /* Chart */
  .chart-wrap { height: 180px; position: relative; }

  /* Weekly grid */
  .week-grid {
    display: grid;
    gap: 6px;
  }

  .week-row {
    display: grid;
    grid-template-columns: 100px repeat(7, 1fr);
    gap: 4px;
    align-items: center;
  }

  .week-label { font-size: 11px; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .week-day-label { text-align: center; font-size: 10px; color: var(--text3); font-family: 'Space Mono', monospace; }
  .week-day-label.today { color: var(--accent); font-weight: 700; }

  .wbox {
    aspect-ratio: 1;
    border-radius: 4px;
    background: var(--bg3);
    transition: all 0.2s;
  }

  .wbox.done { background: var(--accent); box-shadow: 0 0 6px var(--glow); }
  .wbox.miss { background: rgba(247,113,106,0.2); }
  .wbox.future { background: var(--bg3); opacity: 0.4; }

  .week-progress {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .progress-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text2);
    margin-bottom: 8px;
  }

  .progress-row span:last-child {
    font-family: 'Space Mono', monospace;
    color: var(--accent);
  }

  .pbar { height: 3px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
  .pfill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent3)); border-radius: 2px; transition: width 0.8s ease; }

  /* Loading / empty */
  .loading {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; color: var(--text2); font-size: 12px; padding: 24px;
  }

  .spin {
    width: 14px; height: 14px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .empty { text-align: center; color: var(--text2); font-size: 12px; padding: 20px; line-height: 1.6; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  @media (max-width: 1100px) {
    .grid { grid-template-columns: 1fr 1fr; }
    .span2 { grid-column: span 2; }
    .span3 { grid-column: span 2; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 640px) {
    .grid { grid-template-columns: 1fr; }
    .span2, .span3 { grid-column: span 1; }
    .header { grid-template-columns: 1fr; gap: 12px; }
    .header-center { order: -1; }
    .live-clock { font-size: 32px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="greeting" id="greeting">Bonjour !</div>
      <div class="header-title">Command <span>Center</span></div>
    </div>
    <div class="header-center">
      <div class="live-clock" id="clock">00:00:00</div>
      <div class="live-date" id="date-display">—</div>
    </div>
    <div class="header-right">
      <button class="settings-btn" onclick="toggleSettings()" title="Paramètres">⚙️</button>
      <button class="btn" onclick="loadAll()" style="font-size:12px;padding:7px 14px">↺ Sync</button>
    </div>
  </div>

  <!-- SETTINGS (hidden) -->
  <div class="settings-panel" id="settings">
    <label>TOKEN</label>
    <input type="password" id="token" placeholder="secret_..."/>
    <label>TODO DB</label>
    <input type="text" id="todoDb" placeholder="ID base To-do" style="max-width:280px"/>
    <label>HABITS DB</label>
    <input type="text" id="habitsDb" placeholder="ID base Habitudes" style="max-width:280px"/>
    <button class="btn" onclick="saveAndLoad()">✓ Sauvegarder & charger</button>
    <button class="btn ghost" onclick="toggleSettings()">✕ Fermer</button>
  </div>

  <!-- QUOTE -->
  <div class="quote-bar">
    <div class="quote-icon">💫</div>
    <div class="quote-text" id="quote">Chargement...</div>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat" style="--stat-color:var(--accent)">
      <div class="stat-val" id="s-tasks">—</div>
      <div class="stat-lbl">Tâches actives</div>
    </div>
    <div class="stat" style="--stat-color:var(--accent3)">
      <div class="stat-val" id="s-done">0</div>
      <div class="stat-lbl">Complétées</div>
    </div>
    <div class="stat" style="--stat-color:var(--accent2)">
      <div class="stat-val" id="s-habits">—</div>
      <div class="stat-lbl">Habitudes actives</div>
    </div>
    <div class="stat" style="--stat-color:var(--accent4)">
      <div class="stat-val" id="s-streak">—</div>
      <div class="stat-lbl">Meilleur streak 🔥</div>
    </div>
  </div>

  <!-- MAIN GRID -->
  <div class="grid">

    <!-- MIT Tasks -->
    <div class="card">
      <div class="card-head">
        <div class="card-dot" style="background:var(--accent);box-shadow:0 0 6px var(--accent)"></div>
        <div class="card-title">MIT — Top 3</div>
        <div class="card-badge" id="task-count">0</div>
      </div>
      <div id="tasks"><div class="loading"><div class="spin"></div>Chargement...</div></div>
    </div>

    <!-- Habits -->
    <div class="card">
      <div class="card-head">
        <div class="card-dot" style="background:var(--accent2);box-shadow:0 0 6px var(--accent2)"></div>
        <div class="card-title">Habitudes du jour</div>
        <div class="card-badge" id="habit-count">0</div>
      </div>
      <div id="habits"><div class="loading"><div class="spin"></div>Chargement...</div></div>
    </div>

    <!-- Pomodoro -->
    <div class="card">
      <div class="card-head">
        <div class="card-dot" style="background:var(--accent3);box-shadow:0 0 6px var(--accent3)"></div>
        <div class="card-title">Pomodoro Timer</div>
      </div>
      <div class="pomo">
        <div class="pomo-tabs">
          <button class="ptab on" onclick="setMode('focus',25,this)">Focus 25</button>
          <button class="ptab" onclick="setMode('short',5,this)">Pause 5</button>
          <button class="ptab" onclick="setMode('long',15,this)">Pause 15</button>
        </div>
        <div class="pomo-time" id="ptime">25:00</div>
        <div class="pomo-btns">
          <button class="pbtn" onclick="resetP()" title="Reset">↺</button>
          <button class="pbtn play" id="pplay" onclick="toggleP()">▶</button>
          <button class="pbtn" onclick="skipP()" title="Passer">⏭</button>
        </div>
        <div class="pomo-dots">
          <div class="pdot"></div><div class="pdot"></div>
          <div class="pdot"></div><div class="pdot"></div>
        </div>
        <div class="pomo-sub" id="psub">Session 1 / 4</div>
      </div>
    </div>

    <!-- Chart -->
    <div class="card span2">
      <div class="card-head">
        <div class="card-dot" style="background:var(--accent3);box-shadow:0 0 6px var(--accent3)"></div>
        <div class="card-title">Progression habitudes — 30 jours</div>
      </div>
      <div class="chart-wrap"><canvas id="chart"></canvas></div>
    </div>

    <!-- Weekly -->
    <div class="card">
      <div class="card-head">
        <div class="card-dot" style="background:var(--accent4);box-shadow:0 0 6px var(--accent4)"></div>
        <div class="card-title">Cette semaine</div>
      </div>
      <div id="weekly"><div class="loading"><div class="spin"></div>Chargement...</div></div>
    </div>

  </div>
</div>

<script>
// ── QUOTES ──────────────────────────────────────────
const QUOTES = [
  { text: "Le secret pour avancer est de <strong>commencer</strong>.", author: "— Mark Twain" },
  { text: "Chaque expert était autrefois un <strong>débutant</strong>.", author: "— Helen Hayes" },
  { text: "Ce n'est pas ce que tu fais parfois qui compte, c'est ce que tu fais <strong>systématiquement</strong>.", author: "— Marie Forleo" },
  { text: "Tu n'as pas à être géniale pour commencer, mais tu dois <strong>commencer</strong> pour être géniale.", author: "" },
  { text: "Les petits progrès quotidiens mènent aux <strong>grands résultats</strong>.", author: "" },
  { text: "Discipline = <strong>Liberté</strong>.", author: "— Jocko Willink" },
  { text: "Fais-le maintenant. Parfois 'plus tard' devient <strong>jamais</strong>.", author: "" },
  { text: "Tu es plus forte que tu ne le <strong>crois</strong>.", author: "" },
  { text: "Chaque journée est une nouvelle chance de <strong>construire</strong> la vie que tu veux.", author: "" },
  { text: "L'automatisation libère ton esprit pour les choses qui <strong>comptent vraiment</strong>.", author: "" },
  { text: "En AI comme en vie : <strong>itère vite</strong>, apprends encore plus vite.", author: "" },
  { text: "Ta valeur ne se mesure pas à ta productivité — mais les habitudes <strong>construisent</strong> qui tu deviens.", author: "" },
];

let quoteIdx = 0;

function rotateQuote() {
  const el = document.getElementById('quote');
  el.style.opacity = '0';
  setTimeout(() => {
    quoteIdx = (quoteIdx + 1) % QUOTES.length;
    const q = QUOTES[quoteIdx];
    el.innerHTML = `${q.text} <span style="color:var(--text3);font-style:normal;font-size:11px">${q.author}</span>`;
    el.style.opacity = '1';
  }, 400);
}

function initQuote() {
  quoteIdx = Math.floor(Math.random() * QUOTES.length);
  const q = QUOTES[quoteIdx];
  document.getElementById('quote').innerHTML =
    `${q.text} <span style="color:var(--text3);font-style:normal;font-size:11px">${q.author}</span>`;
  setInterval(rotateQuote, 8000);
}

// ── CLOCK ────────────────────────────────────────────
const DAYS = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const MONTHS = ['jan','fév','mar','avr','mai','juin','juil','août','sep','oct','nov','déc'];

function tick() {
  const n = new Date();
  const h = String(n.getHours()).padStart(2,'0');
  const m = String(n.getMinutes()).padStart(2,'0');
  const s = String(n.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}:${s}`;
  document.getElementById('date-display').textContent =
    `${DAYS[n.getDay()]} ${n.getDate()} ${MONTHS[n.getMonth()]} ${n.getFullYear()}`;
  const hr = n.getHours();
  const gr = hr < 6 ? '🌙 Bonne nuit' : hr < 12 ? '☀️ Bonjour' : hr < 18 ? '⚡ Bon après-midi' : '🌙 Bonsoir';
  document.getElementById('greeting').textContent = `${gr}, Svetlana !`;
}

let TOKEN = '', TODO_DB = '3314b9c8-c7ff-8194-8e70-dcdb2ee133d3', HABITS_DB = '3314b9c8-c7ff-812c-9a68-d6515a268579';

function toggleSettings() {

}

// ── NOTION API ───────────────────────────────────────
async function query(dbId) {
  try {
    const r = await fetch(`https://api.notion.com/v1/databases/${dbId}/query`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${TOKEN}`,
        'Content-Type': 'application/json',
        'Notion-Version': '2022-06-28'
      },
      body: JSON.stringify({})
    });
    if (!r.ok) throw new Error(r.status);
    return (await r.json()).results || [];
  } catch(e) { return null; }
}

let tasksRaw = [], habitsRaw = [], chartInst = null;

async function loadAll() {
  document.getElementById('tasks').innerHTML = '<div class="loading"><div class="spin"></div>Sync Notion...</div>';
  document.getElementById('habits').innerHTML = '<div class="loading"><div class="spin"></div>Sync Notion...</div>';
  document.getElementById('weekly').innerHTML = '<div class="loading"><div class="spin"></div>Sync Notion...</div>';

  const [t, h] = await Promise.all([query(TODO_DB), query(HABITS_DB)]);

  if (t) { tasksRaw = t; renderTasks(t); }
  else document.getElementById('tasks').innerHTML = '<div class="empty">⚙️ Ouvre les paramètres<br>et sauvegarde ton token Notion.</div>';

  if (h) { habitsRaw = h; renderHabits(h); renderWeekly(h); updateChart(h); }
  else document.getElementById('habits').innerHTML = '<div class="empty">⚙️ Ouvre les paramètres<br>et sauvegarde ton token Notion.</div>';

  updateStats();
}

// ── TASKS ─────────────────────────────────────────────
function renderTasks(data) {
  const mit = data.filter(t => {
    const m = t.properties?.['MIT (Top 3)']?.checkbox;
    const s = t.properties?.Statut?.select?.name || '';
    return m && !s.includes('Fait') && !s.includes('Annulé');
  });
  const fallback = data.filter(t => {
    const s = t.properties?.Statut?.select?.name || '';
    return !s.includes('Fait') && !s.includes('Annulé');
  });
  const list = (mit.length > 0 ? mit : fallback).slice(0, 5);

  document.getElementById('task-count').textContent = list.length;

  if (!list.length) {
    document.getElementById('tasks').innerHTML = '<div class="empty">🎉 Aucune tâche MIT !<br>Ajoute-en dans Notion.</div>';
    return;
  }

  document.getElementById('tasks').innerHTML = list.map((t, i) => {
    const name = t.properties?.Tâche?.title?.[0]?.plain_text || 'Tâche';
    const p = t.properties?.Priorité?.select?.name || '';
    const e = t.properties?.Énergie?.select?.name || '';
    const s = t.properties?.Statut?.select?.name || '';
    const done = s.includes('Fait');
    const pc = p.includes('Haute') ? 'tag-h' : p.includes('Basse') ? 'tag-l' : 'tag-m';
    const pl = p.replace(/[🔴🟡🟢]/g,'').trim();
    return `<div class="task" style="animation-delay:${i*0.06}s">
      <div class="cb ${done?'on':''}" onclick="toggleCb(this)"></div>
      <div class="task-body">
        <div class="task-name ${done?'done':''}">${name}</div>
        ${e ? `<div class="task-sub">${e}</div>` : ''}
      </div>
      ${pl ? `<span class="tag ${pc}">${pl}</span>` : ''}
    </div>`;
  }).join('');
}

function toggleCb(el) {
  el.classList.toggle('on');
  const n = el.nextElementSibling?.querySelector('.task-name');
  if (n) n.classList.toggle('done');
  const done = document.querySelectorAll('.cb.on').length;
  document.getElementById('s-done').textContent = done;
}

// ── HABITS ────────────────────────────────────────────
function renderHabits(data) {
  const daily = data.filter(h => h.properties?.Fréquence?.select?.name === 'Quotidienne');
  document.getElementById('habit-count').textContent = daily.length;

  if (!daily.length) {
    document.getElementById('habits').innerHTML = '<div class="empty">Aucune habitude quotidienne.<br>Ajoute-en dans Notion !</div>';
    return;
  }

  document.getElementById('habits').innerHTML = daily.map((h, i) => {
    const name = h.properties?.Habitude?.title?.[0]?.plain_text || 'Habitude';
    const streak = h.properties?.['Streak actuel']?.number || 0;
    const cat = h.properties?.Catégorie?.select?.name || '';
    const emoji = cat.match(/\p{Emoji}/u)?.[0] || '•';
    return `<div class="habit" style="animation-delay:${i*0.06}s">
      <span class="habit-icon">${emoji}</span>
      <span class="habit-name">${name}</span>
      <span class="streak">🔥 ${streak}</span>
      <div class="hcheck" onclick="this.classList.toggle('on')"></div>
    </div>`;
  }).join('');
}

// ── WEEKLY ────────────────────────────────────────────
function renderWeekly(data) {
  const daily = data.filter(h => h.properties?.Fréquence?.select?.name === 'Quotidienne').slice(0, 5);
  if (!daily.length) { document.getElementById('weekly').innerHTML = '<div class="empty">Pas de données</div>'; return; }

  const dayLabels = ['L','M','M','J','V','S','D'];
  const todayIdx = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1;

  let html = '<div class="week-grid">';
  html += '<div class="week-row">';
  html += '<div></div>';
  dayLabels.forEach((d, i) => {
    html += `<div class="week-day-label ${i === todayIdx ? 'today' : ''}">${d}</div>`;
  });
  html += '</div>';

  daily.forEach(h => {
    const name = h.properties?.Habitude?.title?.[0]?.plain_text || '';
    const short = name.length > 11 ? name.substring(0, 11) + '…' : name;
    html += '<div class="week-row">';
    html += `<div class="week-label">${short}</div>`;
    for (let i = 0; i < 7; i++) {
      let cls = i < todayIdx ? 'done' : i === todayIdx ? (Math.random() > 0.4 ? 'done' : 'miss') : 'future';
      html += `<div class="wbox ${cls}"></div>`;
    }
    html += '</div>';
  });
  html += '</div>';

  const doneCount = todayIdx + 1;
  const pct = Math.min(100, Math.round((doneCount / 7) * 100));
  html += `<div class="week-progress">
    <div class="progress-row"><span>Progression</span><span>${pct}%</span></div>
    <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
  </div>`;

  document.getElementById('weekly').innerHTML = html;
}

// ── CHART ─────────────────────────────────────────────
function initChart() {
  const ctx = document.getElementById('chart').getContext('2d');
  const labels = [], data = [];
  const now = new Date();
  for (let i = 29; i >= 0; i--) {
    const d = new Date(now); d.setDate(d.getDate() - i);
    labels.push(i % 5 === 0 ? `${d.getDate()}/${d.getMonth()+1}` : '');
    data.push(Math.floor(40 + Math.random() * 45));
  }

  chartInst = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets: [{
      data,
      borderColor: '#7c6af7',
      backgroundColor: 'rgba(124,106,247,0.07)',
      borderWidth: 2,
      fill: true,
      tension: 0.4,
      pointRadius: 0,
      pointHoverRadius: 4,
      pointHoverBackgroundColor: '#7c6af7'
    }]},
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false },
        tooltip: {
          backgroundColor: '#16161f',
          borderColor: 'rgba(124,106,247,0.3)',
          borderWidth: 1,
          titleColor: '#7070a0',
          bodyColor: '#e2e2ee',
          callbacks: { label: c => `${c.parsed.y}% complétées` }
        }
      },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#4a4a70', font: { size: 10, family: 'Space Mono' } } },
        y: { min: 0, max: 100, grid: { color: 'rgba(255,255,255,0.03)' },
          ticks: { color: '#4a4a70', font: { size: 10, family: 'Space Mono' }, callback: v => v+'%' } }
      }
    }
  });
}

function updateChart(habits) {
  if (!chartInst) return;
  const count = habits.filter(h => h.properties?.Fréquence?.select?.name === 'Quotidienne').length;
  const data = Array.from({length: 30}, (_, i) => {
    const base = count > 0 ? 40 + Math.floor(Math.random() * 45) : 0;
    return i < 25 ? base : Math.min(100, base + 5);
  });
  chartInst.data.datasets[0].data = data;
  chartInst.update('active');
}

// ── STATS ─────────────────────────────────────────────
function updateStats() {
  document.getElementById('s-tasks').textContent = tasksRaw.filter(t => {
    const s = t.properties?.Statut?.select?.name || '';
    return !s.includes('Fait') && !s.includes('Annulé');
  }).length || '—';

  const maxStreak = habitsRaw.reduce((m, h) => {
    const s = h.properties?.['Streak actuel']?.number || 0;
    return s > m ? s : m;
  }, 0);
  document.getElementById('s-habits').textContent = habitsRaw.filter(h =>
    h.properties?.Fréquence?.select?.name === 'Quotidienne'
  ).length || '—';
  document.getElementById('s-streak').textContent = maxStreak || '—';
}

// ── POMODORO ──────────────────────────────────────────
let pSec = 1500, pRun = false, pInt = null, pMode = 'focus', pDur = 1500, pSess = 0;

function setMode(mode, min, btn) {
  pMode = mode; pDur = min * 60; pSec = pDur;
  if (pRun) { clearInterval(pInt); pRun = false; }
  document.getElementById('pplay').textContent = '▶';
  document.getElementById('ptime').classList.remove('running');
  drawTime();
  document.querySelectorAll('.ptab').forEach(t => t.classList.remove('on'));
  btn.classList.add('on');
}

function toggleP() {
  if (pRun) {
    clearInterval(pInt); pRun = false;
    document.getElementById('pplay').textContent = '▶';
    document.getElementById('ptime').classList.remove('running');
  } else {
    pRun = true;
    document.getElementById('pplay').textContent = '⏸';
    document.getElementById('ptime').classList.add('running');
    pInt = setInterval(() => {
      pSec--;
      if (pSec <= 0) {
        clearInterval(pInt); pRun = false;
        document.getElementById('pplay').textContent = '▶';
        document.getElementById('ptime').classList.remove('running');
        if (pMode === 'focus') { pSess = Math.min(pSess + 1, 4); updateDots(); }
        pSec = pDur;
      }
      drawTime();
    }, 1000);
  }
}

function resetP() {
  clearInterval(pInt); pRun = false; pSec = pDur;
  document.getElementById('pplay').textContent = '▶';
  document.getElementById('ptime').classList.remove('running');
  drawTime();
}

function skipP() { resetP(); }

function drawTime() {
  const m = String(Math.floor(pSec/60)).padStart(2,'0');
  const s = String(pSec%60).padStart(2,'0');
  document.getElementById('ptime').textContent = `${m}:${s}`;
}

function updateDots() {
  document.querySelectorAll('.pdot').forEach((d,i) => d.classList.toggle('on', i < pSess));
  document.getElementById('psub').textContent =
    pSess >= 4 ? '🎉 Série complète !' : `Session ${pSess+1} / 4`;
}
